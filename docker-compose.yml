version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: school_finance_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sfadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sfpassword}
      POSTGRES_DB: ${POSTGRES_DB:-school_finance}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sfadmin}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: school_finance_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@school.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
